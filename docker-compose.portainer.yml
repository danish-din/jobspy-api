version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password_change_me
      POSTGRES_DB: n8n
      TZ: Europe/London
    volumes:
      - /docker/n8n/postgres:/var/lib/postgresql/data
    networks:
      - n8n-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5678:5678"
    environment:
      - TZ=Europe/London
      - N8N_HOST=n8n.danishdin.co.uk
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.danishdin.co.uk/
      # Database (Postgres)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password_change_me
      # Custom nodes
      - N8N_CUSTOM_EXTENSIONS=/home/node/custom-nodes
      # Behaviour
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_SECURE_COOKIE=false
    volumes:
      - /docker/n8n:/home/node/.n8n
      - /docker/n8n/custom-nodes:/home/node/custom-nodes:ro
    networks:
      - n8n-network

  jobspy-api:
    image: jobspy-docker-api:latest
    container_name: jobspy-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Authentication
      - ENABLE_API_KEY_AUTH=false
      
      # Rate limiting + caching
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_TIMEFRAME=3600
      - ENABLE_CACHE=true
      - CACHE_EXPIRY=3600
      
      # JobSpy Defaults
      - DEFAULT_SITE_NAMES=linkedin,google
      - DEFAULT_RESULTS_WANTED=200
      - DEFAULT_DISTANCE=50
      - DEFAULT_DESCRIPTION_FORMAT=markdown
      - DEFAULT_COUNTRY_INDEED=UK
      
      # Logging
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      
      # API Documentation
      - ENABLE_SWAGGER_UI=true
      - ENABLE_REDOC=true
      - SWAGGER_UI_PATH=/docs
      - REDOC_PATH=/redoc
    volumes:
      - /docker/jobspy-api/logs:/app/logs
    networks:
      - n8n-network

  adminer:
    image: adminer:latest
    container_name: n8n-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - n8n-network

networks:
  n8n-network:
    driver: bridge
